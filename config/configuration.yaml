# Home Assistant development config for Lockly
#
# We avoid default_config: because it pulls in go2rtc, stream, etc.
# which require binaries not present in the devcontainer. Instead we
# include only the components we actually need.

homeassistant:
  debug: true

frontend:
config:
my:
automation: !include automations.yaml
recorder:
logbook:
history:

logger:
  default: info
  logs:
    custom_components.lockly: debug

# MQTT is pre-seeded as a config entry by scripts/develop (which invokes
# scripts/seed_dev_mqtt.py), pointing at localhost:1883. To re-seed, delete
# .storage/core.config_entries before re-running scripts/develop.
